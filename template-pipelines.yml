# File: templates/npm-with-params.yml

parameters:
  name: ''  # defaults for any parameters that aren't specified
  vmImage: ''
  dockername: ''
  LCG: ''
  artifact: ''
  CMTCONFIG: ''

jobs:
- job: ${{ parameters.name }}
  timeoutInMinutes: 300
  pool: 
    vmImage: ${{ parameters.vmImage }}
  steps:
  - script: |
     sudo apt-get install lsb-release
     wget --no-check-certificate https://ecsft.cern.ch/dist/cvmfs/cvmfs-release/cvmfs-release-latest_all.deb
     sudo dpkg -i cvmfs-release-latest_all.deb
     rm -f cvmfs-release-latest_all.deb
     sudo apt-get update
     sudo apt-get install libdb-dev libdb++-dev 
     sudo apt-get install cvmfs cvmfs-config-default
     sudo cvmfs_config setup
     echo "CVMFS_REPOSITORIES=lhcb.cern.ch,grid.cern.ch,sft.cern.ch,sft-nightlies.cern.ch" | sudo tee -a  /etc/cvmfs/default.local > /dev/null
     echo "CVMFS_HTTP_PROXY=DIRECT"  | sudo tee -a  /etc/cvmfs/default.local > /dev/null
     sudo service autofs restart
     sudo cvmfs_config probe
    displayName: 'install cvmfs'
  - script: |
      ls /cvmfs/sft.cern.ch 
      echo $PWD 
      docker create -v /cvmfs:/cvmfs:shared -u 0 --security-opt seccomp=unconfined --name ostap-build ${{ parameters.dockername }} sleep infinity
      docker cp .  ostap-build:/osya
    displayName: 'docker container'
  - script: |
      docker start ostap-build
      docker exec ostap-build /bin/bash -c "dnf clean all -y && rm -rf /etc/yum.repos.d/eos*.repo && dnf which install tkrzw python-tkrzw-doc libdb-devel libdb-cxx-devel libdb-utils -y"
      docker exec ostap-build /bin/bash -c "cd /osya/ && echo $PWD && ls -al && ./.aux/build_with_lcg ${{ parameters.LCG }} ${{ parameters.CMTCONFIG }}"
    displayName: 'build stage'
  - script: |
      ls /cvmfs/sft.cern.ch 
      docker exec ostap-build /bin/bash -c "cd /osya/ && echo $PWD && ls -al && ./.aux/test_with_lcg ${{ parameters.LCG }} ${{ parameters.CMTCONFIG }}"
    displayName: 'test stage'
  - script: |
     docker cp  ostap-build:/osya/build .
    condition: always()
    displayName: 'copy build result'
  - task: PublishPipelineArtifact@0
    inputs:
      artifactName:   ${{ parameters.artifact }}
      targetPath: '$(System.DefaultWorkingDirectory)/build'
    condition: always()
